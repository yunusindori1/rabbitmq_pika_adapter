name: Publish

on:
  push:
    branches:
      - develop
      - release

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build
        run: |
          python -m build

      - name: Check dist
        run: |
          python -m twine check dist/*

      - name: Read package version
        id: version
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import ast
          import pathlib
          import tomllib

          pyproject_path = pathlib.Path("pyproject.toml")
          data = tomllib.loads(pyproject_path.read_text(encoding="utf-8"))
          project = data["project"]
          version = project.get("version")

          if version is None:
              if "version" not in project.get("dynamic", []):
                  raise KeyError("project.version")

              version_attr = data["tool"]["setuptools"]["dynamic"]["version"]["attr"]
              module_name, attr_name = version_attr.rsplit(".", 1)
              module_path = pathlib.Path("src", *module_name.split(".")).with_suffix(".py")
              if not module_path.exists():
                  module_path = pathlib.Path("src", *module_name.split("."), "__init__.py")
              module_ast = ast.parse(module_path.read_text(encoding="utf-8"), filename=str(module_path))

              for node in module_ast.body:
                  if not isinstance(node, ast.Assign):
                      continue
                  for target in node.targets:
                      if isinstance(target, ast.Name) and target.id == attr_name:
                          version = ast.literal_eval(node.value)
                          break
                  if version is not None:
                      break

          if not isinstance(version, str):
              raise RuntimeError("Unable to resolve package version from pyproject.toml")

          print(f"version={version}")
          PY

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-testpypi:
    needs: build
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install twine
          python -m twine upload --repository-url https://test.pypi.org/legacy/ dist/* --verbose

  publish-pypi:
    needs: build
    if: github.ref == 'refs/heads/release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install twine
          python -m twine upload dist/* --verbose

      - name: Create git tag (best-effort)
        env:
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${VERSION}" -m "Release v${VERSION}" || true
          git push origin "v${VERSION}" || true

      - name: Create PR release -> master (best-effort)
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          gh pr create --base master --head release --title "Release v${VERSION} -> master" --body "Automated PR created after publishing v${VERSION} to PyPI." || true
